{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Request List</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/main_mech.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar_mech.css' %}">
    <link rel="stylesheet" href="{% static 'css/mech_inputs.css' %}">
    <script src="{% static 'js/sidebar.js' %}"></script>
    <script src="{% static 'js/table_adjust.js' %}"></script>
</head>
<body>
    {% include "partials/_sidebar_mech.html" %}

    <div style="margin-left: 220px;">
        <h1>{{product.project}} Product Number {{product.productnumber}}</h1>
    <table id="resizable-table">
        <thead>
            <tr>
                <th>Title</th>
            </tr>
        </thead>
        <tbody>
            {% for mech in all_packs %}
            <tr>
                <td>{{ mech.part.part_number }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="4">No part found.</td></tr>
            {% endfor %}
        </tbody>
    </table>    
    <a class="greenbutton" href="/mech/add_product/" style="text-decoration: none;">Return</a>
    </div>

</body>

</html>
