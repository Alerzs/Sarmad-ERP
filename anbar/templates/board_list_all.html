{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Board List</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/board_list_all.css' %}">
    <script src="{% static 'js/sidebar.js' %}"></script>
    <script src="{% static 'js/table_adjust.js' %}"></script>
</head>
<body>
    {% include "partials/_sidebar.html" %}

    <div class="page-content">
        <h1>Board List</h1>
        <table id="resizable-table">
            <thead>
                <tr id="header-row">
                  <th data-field="project">Project</th>
                  <th data-field="title">Title</th>
                </tr>
              </thead>
            <tbody>
                {% for board in boards %}
                    <tr>
                        <td>{{ board.project_name__name }}</td>
                        <td><a href="{{ board.project_name__name }}/{{ board.title }}">{{ board.title }} - E{{ board.name }}</a></td>
                    </tr>
                {% empty %}
                    <tr><td colspan="6">No boards found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div id="pagination" class="pagination"></div>

    <script src="{% static 'js/board_list_all.js' %}"></script>
</body>
</html>
