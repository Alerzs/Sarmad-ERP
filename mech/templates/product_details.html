{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>All Products</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/main_mech.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar_mech.css' %}">
    <link rel="stylesheet" href="{% static 'css/mech_inputs.css' %}">
    <script src="{% static 'js/sidebar.js' %}"></script>
    <script src="{% static 'js/table_adjust.js' %}"></script>
</head>
<body>
    {% include "partials/_sidebar_mech.html" %}

    <div style="margin-left: 220px;">
        <h1>{{product.project}} Product Number {{product.productnumber}}</h1>
        <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Part ID</th>
            </tr>
        </thead>
        <tbody>
            {% for indx, parts in all_packs.items %}
            <tr>
                <td rowspan="{{parts|length}}">{{ indx }}</td>
                {% for part in parts %}
                <td>
                    {{ part }}
                </td>
            </tr>                
            {% endfor %}
            {% endfor %}
        </tbody>
    </table> 
    </div>

</body>

</html>
