{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Select Options</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/main_qc.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/request_qc.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar_qc.css' %}">
    <script src="{% static 'js/sidebar.js' %}"></script>
</head>
<body>
    {% include "partials/_sidebar_qc.html" %}
    <h1 style="margin-left: 220px;">Select Your Options</h1>
    <form method="post">
        {% csrf_token %}

        <div class="form-row">

            <div class="section">
                <button type="button" class="toggle-btn" onclick="togglePanel('projectPanel')">project</button>
                <div id="projectPanel" class="panel">
                    {% for project in projects %}
                        <label>
                            <input type="radio" name="project" value="{{ project.id }}"> {{ project.name }}
                        </label><br>
                    {% endfor %}
                </div>
            </div>

            <script>
                const allBoards = {{ boards_json|safe }};
            </script>
              
            <div class="section">
                <button type="button" class="toggle-btn" onclick="togglePanel('namePanel')">board name</button>
                <div id="namePanel" class="panel"></div>
            </div>

            <div class="section">
                <button type="button" class="toggle-btn" onclick="togglePanel('boardPanel')">Board ID</button>
                <div id="boardPanel" class="panel">
                    <label>
                        <input type="checkbox" id="selectAllBoards" onclick="toggleSelectAllBoards(this)"> Select All
                    </label><br>
                </div>
            </div>

            <div class="section">
                <button type="button" class="toggle-btn" onclick="togglePanel('userPanel')">Operator</button>
                <div id="userPanel" class="panel">
                    {% for user in users %}
                        <label>
                            <input type="radio" name="user" value="{{ user.id }}" required> {{ user.username }}
                        </label><br>
                    {% endfor %}
                </div>
            </div>
            <button type="submit" class="btn">Submit</button>
        </div>
    </form>
    <script src="{% static 'js/request_qc.js' %}"></script>
</body>
</html>
