{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>All Parts</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/main_mech.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar_mech.css' %}">
    <link rel="stylesheet" href="{% static 'css/mech_inputs.css' %}">
    <script src="{% static 'js/sidebar.js' %}"></script>
    <script src="{% static 'js/table_adjust.js' %}"></script>
</head>
<body>
    {% include "partials/_sidebar_mech.html" %}

    <div style="margin-left:220px;">
        <h1>{{ prj }}</h1>
    </div>

    <div style="margin-left: 220px;">
        <table id="resizable-table">
            <thead>
                <tr>
                    <th>Part Name</th>
                    <th>Version</th>
                    <th>Connected Qnt</th>
                    <th>Separated Qnt</th>
                </tr>
            </thead>
            <tbody>
                {% for part in parts %}
                    <tr>
                        <td>M{{ part.name }} ({{ part.title }})</td>
                        <td><a href="{{ part.title }}-{{ part.version }}">V{{ part.version }}</a></td>
                        <td>{{ part.same_connected }}</td>
                        <td>{{ part.same_separated }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
